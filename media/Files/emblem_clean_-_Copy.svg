<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Helmet -->
  <g id="helmet" fill="currentColor" stroke="currentColor" stroke-width="2">
    <path d="M50 120 Q150 40 250 120 Q240 140 60 140 Z" />
    <path d="M60 140 Q150 100 240 140" fill="none"/>
  </g>
  <!-- Boots -->
  <g id="boots" fill="currentColor" stroke="currentColor" stroke-width="2">
    <!-- Left boot -->
    <rect x="70" y="180" width="60" height="40" rx="6" ry="6"/>
    <rect x="65" y="200" width="70" height="30" rx="6" ry="6"/>
    <!-- Right boot -->
    <rect x="170" y="180" width="60" height="40" rx="6" ry="6"/>
    <rect x="165" y="200" width="70" height="30" rx="6" ry="6"/>
  </g>
</svg>
