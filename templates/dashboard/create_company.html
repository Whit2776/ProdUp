<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Company</title>
</head>
<body>
  <span id='lolo' style='position: fixed; top: 3%; left: 8%; font-weight:bold; color:#111;'>ProdUp</span>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      min-height: 100vh;
      /* Modern, subtle gradient */
      background: linear-gradient(to right, #f4f4f5, #e0e0e0);
      font-family: 'Segoe UI', sans-serif;
      color: #111; /* dark neutral for text */
    }

    main{
      height: 100vh;
      display: grid;
      grid-template-areas: "form display-video";
      grid-template-columns: 2fr 1fr;
    }

    #form-container{
      grid-area: form;
      display: grid;
      place-content: center;
    }

    #form-container .header{
      margin-bottom: 30px;
      color: #111;
    }

    #form-container form{
      display: flex;
      flex-flow: column nowrap;
      gap: 1.5rem;
      transform: translateY(-20%);
      width: 150%;
      height: auto;
    }

    .display-video{
      grid-area: display-video;
      height: 100%;
      max-height: 100vh;
      display: flex;
      padding:0.5rem;
      background: transparent;
    }

    .display-video video{
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 0.5rem;
    }

    .field-group{
      position: relative;
      width: 50%;
      min-width: 250px;
      align-self: center;
    }

    .field-group input{
      padding: 1rem 1.5rem;
      border-radius: 0.5rem;
      border: 2px solid #c4c4c4; /* neutral border */
      width: 100%;
      justify-content: center;
      transition: all 0.3s;
      font-size: 1rem;
    }

    .field-group label{
      position: absolute;
      left: 5%;
      transform: translateY(50%);
      transition: all 0.3s;
      color: #555; /* muted label */
      pointer-events: none;
    }

    /* Focus and valid state use the accent color */
    .field-group input:focus-within, 
    .field-group input:valid{
      border-color: #4f46e5; /* primary accent - purple */
      box-shadow: 0px 0px 4px 1px rgba(79,70,229,0.3);
      outline: none;
    }

    .field-group input:focus-within + label, 
    .field-group input:valid + label{
      transform: translateY(-50%);
      font-size: 75%;
      color: #4f46e5; /* match accent color */
      background: white;
      padding: 0.25rem 0.5rem;
      font-weight: bolder;
    }

    .header{
      text-align: center;
    }

    button{
      align-self: center;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.5rem;
      width: 65%;
      background: #4f46e5; /* same accent for consistency */
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover{
      background: #3730a3; /* slightly darker purple on hover */
    }

    @media (max-width: 600px){

      main{
        display: block;
        position: relative;
      }

      /* Make video full screen background */
      .display-video{
        position: fixed;
        inset: 0;
        z-index: -2;
        padding: 0;
      }

      .display-video video{
        border-radius: 0;
      }

      /* Add dark overlay for readability */
      .display-video::after{
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: -1;
      }

      #form-container{
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      #form-container form{
        width: 100%;
        max-width: 420px;
        transform: none;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 1rem;
        padding: 2rem;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
      }

      .field-group{
        width: 100%;
      }

      .field-group input{
        background: rgba(255, 255, 255, 0.9);
      }

      .field-group label{
        color: #020202;
      }

      button{
        width: 100%;
      }

    }
    /* ===============================
   GLOBAL RESPONSIVE IMPROVEMENTS
================================= */

/* Better typography scaling */
html {
  font-size: clamp(14px, 1vw, 16px);
}

/* Constrain form container properly */
#form-container {
  padding: clamp(2rem, 5vw, 6rem);
}

/* Remove the hack */
#form-container form {
  transform: none !important;
  width: 100% !important;
  max-width: 520px;
  margin: 0 auto;
}

/* Make fields fluid */
.field-group {
  width: 100% !important;
  max-width: 520px;
}

/* Improve input responsiveness */
.field-group input {
  font-size: 1rem;
  padding: 1rem 1.25rem;
}

/* Improve heading scaling */
.header h1 {
  font-size: clamp(1.8rem, 3vw, 2.6rem);
  margin-bottom: 0.5rem;
}

.header p {
  font-size: clamp(0.9rem, 1.5vw, 1rem);
  color: #555;
  max-width: 450px;
  margin: 0 auto;
}

/* Button scaling */
button {
  max-width: 520px;
  width: 100%;
  padding: 0.9rem;
  font-size: 1rem;
}

/* Improve desktop video spacing */
.display-video {
  padding: clamp(0.5rem, 2vw, 2rem);
}

/* ===============================
   LARGE SCREENS (Ultra-wide)
================================= */

@media (min-width: 1600px) {

  main {
    grid-template-columns: 1.5fr 1fr;
  }

  #form-container {
    padding-left: 10%;
  }

}

/* ===============================
   TABLETS
================================= */

@media (max-width: 1024px) {

  main {
    grid-template-columns: 1fr 1fr;
  }

  #form-container {
    padding: 3rem;
  }

}

/* ===============================
   MOBILE
================================= */

@media (max-width: 600px){

  body {
    background: #000;
  }

  #lolo {
    color: white !important;
    left: 50%;
    transform: translateX(-50%);
  }

  .header h1,
  .header p {
    color: white;
  }

  .field-group input {
    background: rgba(255,255,255,0.9);
  }

  button {
    font-size: 1rem;
  }

}
  </style>

  <main>
    <section id="form-container">
      <form action="" id="create-company">
        <div class="header">
          <h1>Get started Now!</h1>
          <p>
            A gift for any entreprenuer.
            Create a company now.  
          </p>
        </div>

        <div class="field-group">
          <input type="text" name='name' required>
          <label for="name"> Company Name</label>
        </div>
        <div class="field-group">
          <input type="text" name='address' required>
          <label for="address">Address</label>
        </div>
        <div class="field-group">
          <input type="text" name='email' required>
          <label for="email">Email</label>
        </div>
        <div class="field-group">
          <input type="text" name='phone_number' required>
          <label for="phone_number">Phone Number</label>
        </div>
        {% csrf_token %}
        <button type="submit">Create</button>
      </form>
    </section>

    <div class="display-video">
      <video autoplay muted loop playsinline class="bg-video">
        <source src="{% static 'dashboard/design/create_company/sign_up.mp4' %}" type="video/mp4">
      </video>
    </div>
  </main>
  <script>
    let form = document.querySelector('#create-company')
    let url = '/api/create-company'

    form.addEventListener('submit', async e => {
      e.preventDefault()
      let formdata = new FormData(form)

      let res = await fetch(url, {method: 'POST', body: formdata})
      let res_json = await res.json()

      if (res_json.success){
        location.href = '/emails/check-email'
      }

    })
  </script>
</body>
</html>
