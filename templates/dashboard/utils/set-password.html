<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Administrator Password</title>


<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f172a;
    position: relative;
    overflow: hidden;
}

/* Subtle background texture */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 20% 20%, #1e293b 0%, transparent 60%),
                radial-gradient(circle at 80% 80%, #1e293b 0%, transparent 60%);
    opacity: 0.4;
}

/* Low opacity overlay */
body::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(15, 23, 42, 0.65);
}

/* Glass Card */
.card {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 420px;
    padding: 40px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    color: white;
}

h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
}

.subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 28px;
}

.form-group {
    margin-bottom: 18px;
}

label {
    display: block;
    font-size: 13px;
    margin-bottom: 6px;
    color: rgba(255,255,255,0.8);
}

input {
    width: 100%;
    padding: 11px 12px;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: white;
    outline: none;
    transition: border 0.2s, background 0.2s;
}

input::placeholder {
    color: rgba(255,255,255,0.4);
}

input:focus {
    border-color: rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.12);
}

.checkbox-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    margin: 20px 0;
}

button {
    width: 100%;
    padding: 11px;
    border-radius: 8px;
    border: none;
    background: white;
    color: #0f172a;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.05s;
}

button:hover:not(:disabled) {
    opacity: 0.85;
}

button:active {
    transform: translateY(1px);
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.error {
    font-size: 13px;
    color: #f87171;
    margin-top: 8px;
    display: none;
}

.error.show {
    display: block;
}
</style>
</head>
<body>

<div class="card">
    <h1>Set Administrator Password</h1>
    <div class="subtitle">Create a secure password to activate your account.</div>

    <form id="passwordForm">
      {% csrf_token %}
        <div class="form-group">
            <label>Password</label>
            <input name='pass-1' type="password" id="password" placeholder="Minimum 8 characters">
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input name='pass-2' type="password" id="confirmPassword" placeholder="Re-enter password">
        </div>

        <div class="error" id="errorMessage">
            Please complete all fields correctly.
        </div>

        <button type="submit" id="submitBtn" disabled>Activate Account</button>
    </form>
</div>

<script>
const password = document.getElementById('password');
const confirmPassword = document.getElementById('confirmPassword');
const terms = document.getElementById('terms');
const submitBtn = document.getElementById('submitBtn');
const errorMessage = document.getElementById('errorMessage');

function validateForm() {
    const passwordVal = password.value;
    const confirmVal = confirmPassword.value;

    const isValidLength = passwordVal.length >= 8;
    const passwordsMatch = passwordVal === confirmVal && passwordVal !== '';

    const isValid = isValidLength && passwordsMatch;
    submitBtn.disabled = !isValid;

    if (!isValid) {
        errorMessage.classList.remove('show');
    }
}

password.addEventListener('input', validateForm);
confirmPassword.addEventListener('input', validateForm);
let form = document.getElementById('passwordForm')
form.addEventListener('submit', async function(e) {
    e.preventDefault();

    if (submitBtn.disabled) {
        errorMessage.classList.add('show');
        return;
    }
    let url = `/api/set-password/${location.href.split('/')[4]}`
    let formdata = new FormData(form)

    let res = await fetch(url, {method: 'POST', body: formdata})
    let res_json = await res.json()

    submitBtn.textContent = 'Activating...';
    submitBtn.disabled = true;

    if(res_json.success){
      submitBtn.textContent = 'Activated';
      document.querySelector('.loading-message-container').classList.add('activated')
      setTimeout(() => {
        location.href = '/dashboard'
      }, 4000);
    }

});
</script>

<div class="loading-message-container">
  <div id='loading-message'>
    Logging In...
    <span class='loader'></span>
  </div>
</div>

<style>
  .loading-message-container{
    position: fixed;
    top: -100%;
    width: 30%;
    padding: 0.5rem;
    background: #e4efe1;
    color: #97fa56;
    border-radius: 0.25rem;
    text-align: center;
    transition: top 1.5s linear
  }

  .loading-message-container .loading-message{
    position: relative;
  }

  .loading-message-container span.loader{
    width: 100%;
    height: 5px;
    background: #97fa56;
    position: absolute;
    bottom: 0;
    left: 0;
    border-radius: 5px;
    transition: width 4s linear;
  }

  .loading-message-container.activated{
    top: 2%;
  }

  .loading-message-container.activated span.loader{
    width: 0;
  }
</style>

</body>
</html>
