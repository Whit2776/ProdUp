<!DOCTYPE html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Role</title>
    <link rel="shortcut icon" href="{% static 'images/tas-logo.jpg'%}">

    <link href="{%get_static_prefix%}dashboard/assets/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <link href="{%get_static_prefix%}dashboard/assets/css/icons.min.css" rel="stylesheet" type="text/css" />
    <link href="{%get_static_prefix%}dashboard/assets/css/app.min.css" rel="stylesheet" type="text/css" />
  </head>
  <style>

    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #222;
      --accent: #4c6ef5;
      --select-color: #2b2b2b85;
      --shadow: rgba(0,0,0,0.1);
    }

    .dark{
      --bg: #1f1f1fff;
      --card: #1d1d1db7;
      --text: #fffdfdd0;
      --accent: #ffffff98;
      --select-color: #ececec85;
      --shadow: rgba(255, 255, 255, 0.1);
    }

    body {
      font-family: "Poppins", sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .form-container{
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .role-form-container {
      background: var(--card);
      padding: 20px 35px;
      border-radius: 15px;
      box-shadow: 0 4px 25px var(--shadow);
      width: 50%;
      height: auto;
      margin-top: 2rem;
    }

    .role-form-container h2 {
      text-align: center;
    }

    label {
      font-size: 14px;
      margin-top: 10px;
    }

    .role-form-container input,
    .role-form-container select,
    .role-form-container textarea, 
    .role-form-container button {
      width: 100%;
      margin-top: 5px;
      padding: 9px;
      border-radius: 6px;
      border: 1px solid #ccc;
      outline: none;
      font-size: 14px;
    }

    textarea {
      min-height: 60px;
    }

    .role-form-container button {
      margin-top: 18px;
      background: var(--accent);
      color: white;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }

    button:hover {
      opacity: 0.9;
    }

    .select-form{
      padding: 0.75rem;
      color: var(--select-color);
      background: var(--bg)
    }

    .permission-container{
      display: flex;
      justify-content: space-between;
      align-items:center;
      width: 100%;
    }

    .permission-container h5{
      white-space: nowrap;
    }

    .permission-container .check-box{
      width: 30px;
    }

  </style>
  <body>
    {% include "dashboard/components/nav.html" %}

    <div class="page-wrapper">
      <div class="page-content">
        <div class="container-fluid" style='display: flex;'>
          <div class="form-container">
            <div class="role-form-container">
              <form id="roleForm" method='post'>
                {% csrf_token %}
                <h2>Create Role</h2>
                <label>Type</label>
                <select name="type" class="select-form">
                  <option value="Admin">Admin</option>
                  <option value="Staff">Staff</option>
                </select>

                <label>Name</label>
                <input type="text" required placeholder="Manager, Supervisor, Employee" name = 'name'>

                <label>Position</label>
                <input placeholder="Eg. Technician in Machinery Dept" required name='position'>

                <label>Department</label>
                {% if departments|length > 0 %}
                <select name="department" id="" class='select-form'>
                  {% for department in departments %}
                  <option value="{{department.id}}">{{department.name}}</option>
                  {% endfor %}
                </select>
                {% else %}
                <h5>You have no departments, create a <a href="#">Department</a></h5>
                {% endif %}

                <label>Base Rate Per Task</label>
                <input type="number" step="0.01" min='0' required placeholder="120.50" name='base_rate'>

                <label>Description</label>
                <textarea required name='description'></textarea>

                <button type="submit">Submit</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="{%get_static_prefix%}dashboard/assets/libs/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="{%get_static_prefix%}dashboard/assets/libs/simplebar/simplebar.min.js"></script>
    <script src="{%get_static_prefix%}dashboard/assets/js/app.js"></script>
  </body>
</html>
