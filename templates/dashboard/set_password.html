<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Password</title>
  </head>
  <body>
    <style>
      /* Reset & base */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }

      body {
        height: 100vh;
        background: #0f172a; /* dark background */
      }

      /* Layout */
      .page-wrapper {
        width: 100%;
        height: 100%;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .page-content {
        background: #020617;
        padding: 32px;
        border-radius: 14px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        text-align: center;
      }

      .page-content h2 {
        color: #e5e7eb;
        margin-bottom: 20px;
        font-size: 1.5rem;
      }

      /* Form */
      .form {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .form input {
        width: 100%;
        padding: 14px;
        border-radius: 10px;
        border: 1px solid #1e293b;
        background: #020617;
        color: #f8fafc;
        outline: none;
        transition: border 0.2s, box-shadow 0.2s;
      }

      .form input:focus {
        border-color: #38bdf8;
        box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
      }

      /* Error state */
      .form input.error {
        border-color: #ef4444;
      }

      .error-text {
        color: #ef4444;
        font-size: 0.85rem;
        text-align: left;
        display: none;
      }

      /* Button */
      .form button {
        margin-top: 10px;
        padding: 14px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, #38bdf8, #2563eb);
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s, opacity 0.15s;
      }

      .form button:hover {
        transform: translateY(-1px);
        opacity: 0.9;
      }

    </style>
    <div class="page-wrapper">
      <div class="page-content">
        <h2>Set Password</h2>
        <form action="" class='form' method = 'post'>
          {% csrf_token %}
          <input type="password" name='password pass-1' class='password-1'>
          <input type="password" name='password pass-2' class='password-2'>
          <p class="error-text">Passwords do not match</p>

          <button type="submit">Set Password</button>
        </form>
      </div>
    </div>

    <script>
      const form = document.querySelector('.form')
      const pass1 = document.querySelector('.password-1')
      const pass2 = document.querySelector('.password-2')
      const errorText = document.querySelector('.error-text')

      const validatePasswords = () => {
        if (pass1.value && pass2.value && pass1.value !== pass2.value) {
          pass1.classList.add('error')
          pass2.classList.add('error')
          errorText.style.display = 'block'
          return false
        } else {
          pass1.classList.remove('error')
          pass2.classList.remove('error')
          errorText.style.display = 'none'
          return true
        }
      }

      /* Live check */
      pass1.addEventListener('input', validatePasswords)
      pass2.addEventListener('input', validatePasswords)

      /* On submit */
      form.addEventListener('submit', (e) => {
        if (!validatePasswords()) {
          e.preventDefault()
        }
      })

    </script>
  </body>
</html>
