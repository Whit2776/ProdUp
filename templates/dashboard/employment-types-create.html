<!DOCTYPE html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Employment Types</title>
    <link rel="shortcut icon" href="{% static 'images/tas-logo.jpg'%}">

    <link href="{%get_static_prefix%}dashboard/assets/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <link href="{%get_static_prefix%}dashboard/assets/css/icons.min.css" rel="stylesheet" type="text/css" />
    <link href="{%get_static_prefix%}dashboard/assets/css/app.min.css" rel="stylesheet" type="text/css" />
    <style>
      .form-container{
        width: 100%;
        height: 80vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      :root {
        --bg: #f5f5f5;
        --card: #ffffff;
        --text: #222;
        --accent: #4c6ef5;
        --select-color: #cfcfcf85;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: var(--bg);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .role-form-container {
        background: var(--card);
        padding: 20px 35px;
        border-radius: 15px;
        box-shadow: 0 4px 25px rgba(0,0,0,0.1);
        width: 50%;
        height: auto;
      }

      .role-form-container h2 {
        text-align: center;
      }

      label {
        font-size: 14px;
        margin-top: 10px;
      }

      .role-form-container input,
      .role-form-container select,
      .role-form-container textarea, 
      .role-form-container button {
        width: 100%;
        margin-top: 5px;
        padding: 9px;
        border-radius: 6px;
        border: 1px solid #ccc;
        outline: none;
        font-size: 14px;
      }

      textarea {
        min-height: 60px;
      }

      .role-form-container button {
        margin-top: 18px;
        background: var(--accent);
        color: white;
        font-weight: 600;
        cursor: pointer;
        border: none;
      }

      button:hover {
        opacity: 0.9;
      }

      .select-form{
        padding: 0.75rem;
        color: var(--select-color);
        background: var(--bg)
      }
    </style>
  </head>

  <body>
    {% include "dashboard/components/nav.html" %}
    <div class="page-wrapper">
      <div class="page-content">
        <div class="container-fluid" style='display: flex;'>
          <div class="form-container">
            <div class="role-form-container">
              <form id="roleForm" method='post'>
                {% csrf_token %}
                <h2>Create E.type</h2>

                <label>Type</label>
                <input type="text" required placeholder="Eg., Full Time" name = 'type'>

                <label>Factor</label>
                <input type="number" min='0.3' step='0.1' name = factor>

                <button type="submit">Submit</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="{%get_static_prefix%}dashboard/assets/libs/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="{%get_static_prefix%}dashboard/assets/libs/simplebar/simplebar.min.js"></script>
    <script src="{%get_static_prefix%}dashboard/assets/js/app.js"></script>
  </body>
</html>
