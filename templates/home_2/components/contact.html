<div class="contact-area-two" >
            <div class="container-fluid">
                <div class="row">
                    <div class="col-lg-7">
                        <div class="contact-two-form pt-100 pb-70">
                            <div class="contact-wrap-form">
                                <h2>Contact Us</h2>
                                <form id="contactForm" method='POST' action='{% url "contact" %}' enctype = 'multipart/form-data'>
                                  {% csrf_token %}
                                    <div class="row">
                                        <div class="col-lg-6 col-sm-6">
                                            <div class="form-group">
                                                <i class='bx bx-user'></i>
                                                <input type="text" name="name" id="name" class="form-control" required data-error="Please enter your name" placeholder="Your Name*">
                                                <div class="help-block with-errors"></div>
                                            </div>
                                        </div>
        
                                        <div class="col-lg-6 col-sm-6">
                                            <div class="form-group">
                                                <i class='bx bx-envelope'></i>
                                                <input type="email" name="email" id="email_address" required data-error="Please enter email address" class="form-control" placeholder="Email Address*">
                                                <div class="help-block with-errors"></div>
                                            </div>
                                        </div>
        
                                        <div class="col-lg-6 col-sm-6">
                                            <div class="form-group">
                                                <i class='bx bx-phone'></i>
                                                <input type="text" name="phone_number" id="phone_number" required data-error="Please enter your number" class="form-control" placeholder="Your Phone">
                                                <div class="help-block with-errors"></div>
                                            </div>
                                        </div>
        
                                        <div class="col-lg-6 col-sm-6">
                                            <div class="form-group">
                                                <i class='bx bx-git-compare'></i>
                                                <input type="text" name="subject" id="msg_subject" class="form-control" required data-error="Please enter your subject" placeholder="Your Subject">
                                                <div class="help-block with-errors"></div>
                                            </div>
                                        </div>
        
                                        <div class="col-lg-12 col-md-12">
                                            <div class="form-group">
                                                <i class='bx bx-envelope'></i>
                                                <textarea name="msg" class="form-control" id="message" cols="30" rows="8" required data-error="Write your message" placeholder="Your Message"></textarea>
                                                <div class="help-block with-errors"></div>
                                            </div>
                                        </div>

                                        
                                        <div class="col-lg-12 col-md-12">
                                            <div class="form-group">
                                                <i class='bx bx-files'></i>
                                                <br>
                                                <label for="files"> Attach files </label>
                                                <input type="file" name="files" id="files" multiple>
                                                <div class="help-block with-errors"></div>
                                            </div>
                                        </div>
        
                                        <div class="col-lg-12 col-md-12">
                                            <button type="submit" class="default-btn">
                                                Send Your Message
                                            </button>
                                            <div id="msgSubmit" class="h3 text-center hidden"></div>
                                            <div class="clearfix"></div>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-5">
                        <div class="contact-map">
                            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d992.5086798910628!2d-0.04030310344948044!3d5.70812346515486!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xfdf81f76a086905%3A0x2807d932902dc2d8!2sLebanon%20police%20junction!5e0!3m2!1sen!2sgh!4v1758709692078!5m2!1sen!2sgh" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                        </div>
                    </div>
                </div>
            </div>
        </div>
